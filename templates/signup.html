<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Security - Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Navbar -->
    <div id="nav">
        {% include 'navbar.html' %}
    </div>

    {% if message %}
    <script>
        alert('{{ message }}');
    </script>
    {% endif %}

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-card">
                    <div class="glass-header text-center pt-4">
                        <h2>Signup</h2>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST" action="/usersignup">
                            <div class="mb-4">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" id="username" name="name" class="form-control" placeholder="Enter your username" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                            </div>
                            <div class="mb-4">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary">Signup</button>
                            </div>
                        </form>
                    </div>
                    <div class="text-center pb-4">
                        <p style="color: var(--text-muted);">Already have an account? <a href="/userlogin" class="text-primary text-decoration-none fw-bold">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
